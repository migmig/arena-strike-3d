<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arena Strike 3D</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; background: #000; color: #fff; font-family: system-ui, sans-serif; }
      #game-canvas { display: block; width: 100vw; height: 100vh; }
      #hud { position: fixed; inset: 0; pointer-events: none; }
      #hud > * { pointer-events: auto; }
      #click-to-play {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.7); font-size: 1.5rem; cursor: pointer; user-select: none;
      }
      #click-to-play.hidden { display: none; }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="click-to-play">Click to play</div>
      <div id="ui-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
